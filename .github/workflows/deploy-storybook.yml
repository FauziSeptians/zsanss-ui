name: Test and Deploy Storybook

on:
  push:
    branches:
      - main
      - release/prod

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build and Push Docker Image
        run: |
          docker build -t storybook-app .
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker tag storybook-app ${{ secrets.DOCKER_USERNAME }}/storybook-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/storybook-app:latest

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Update Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/storybook-app:latest
            
            sudo docker stop storybook-web || true
            sudo docker rm storybook-web || true
            
            # Menjalankan Storybook di port 6006
            sudo docker run -d \
              --name storybook-web \
              --restart always \
              -p 6006:80 \
              ${{ secrets.DOCKER_USERNAME }}/storybook-app:latest
            
            sudo docker image prune -f