name: Build & Deploy Storybook

on:
  push:
    branches: [ main ] # Ganti jika branch utama Anda bukan main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/storybook-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Login ke Docker (Opsional jika repo public)
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # Hentikan kontainer lama jika ada
            docker stop storybook-web || true
            docker rm storybook-web || true
            
            # Pull image terbaru
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/storybook-app:latest
            
            # Jalankan kontainer baru di port 6006
            docker run -d \
              --name storybook-web \
              --restart always \
              -p 6006:80 \
              ${{ secrets.DOCKERHUB_USERNAME }}/storybook-app:latest